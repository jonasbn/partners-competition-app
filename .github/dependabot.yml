# Basic dependabot.yml file
# REF: https://docs.github.com/en/code-security/supply-chain-security/keeping-your-actions-up-to-date-with-dependabot

version: 2
updates:
  # Enable version updates for Actions
  - package-ecosystem: "github-actions"
    # Look for `.github/workflows` in the `root` directory
    directory: "/"
    # Check for updates once a week
    schedule:
      interval: "weekly"
  
  # Regular npm version updates: grouped into fewer PRs on a monthly schedule
  # Security npm updates: separate group, triggered by GitHub security advisories
  # Note: cooldown applies to version updates only; security advisory updates
  # are triggered immediately and are not subject to cooldown
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 4
    groups:
      # Regular updates: bundle all version bumps into a single grouped PR
      npm-regular-updates:
        applies-to: version-updates
        patterns:
          - "*"

